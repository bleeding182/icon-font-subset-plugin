name: Build and Publish

on:
  push:
    branches: [ main, develop, 'dev/**' ]
    tags:
      - 'v*'
    paths:
      - 'plugin/**'
      - 'runtime/**'
      - '.github/workflows/build-and-publish.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'plugin/**'
      - 'runtime/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  DOCKER_BUILDKIT: 1

jobs:
  # ==========================================================================
  # Cross-compile native libraries for all platforms
  # ==========================================================================
  build-native:
    name: Build Native Libraries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read HarfBuzz version
        id: hb
        run: |
          echo "version=$(grep '^harfbuzzVersion=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: plugin
          file: plugin/Dockerfile.cross-compile
          push: false
          load: true
          tags: fontsubsetting-cross-compiler:local
          build-args: |
            HARFBUZZ_VERSION=${{ steps.hb.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push Docker image to GHCR
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: plugin
          file: plugin/Dockerfile.cross-compile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fontsubsetting-cross-compiler:latest
          build-args: |
            HARFBUZZ_VERSION=${{ steps.hb.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build all native libraries
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace/plugin \
            fontsubsetting-cross-compiler:local \
            bash -c "chmod +x ./build-all-natives.sh && ./build-all-natives.sh"

      - name: Upload plugin native libraries
        uses: actions/upload-artifact@v4
        with:
          name: plugin-natives
          path: |
            plugin/src/main/resources/native/linux-x86_64/libfontsubsetting.so
            plugin/src/main/resources/native/linux-aarch64/libfontsubsetting.so
            plugin/src/main/resources/native/windows-x86_64/fontsubsetting.dll
            plugin/src/main/resources/native/darwin-x86_64/libfontsubsetting.dylib
            plugin/src/main/resources/native/darwin-aarch64/libfontsubsetting.dylib
          retention-days: 7

  # ==========================================================================
  # Verify the Linux .so loads on an old glibc (locks in the 2.17 baseline
  # set by the Zig wrappers in Dockerfile.cross-compile). The test job runs
  # on Ubuntu 24.04 (glibc 2.39), so it can't catch a baseline regression
  # on its own.
  # ==========================================================================
  glibc-baseline:
    name: Verify glibc 2.17 baseline (linux-x86_64)
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - name: Download native libraries
        uses: actions/download-artifact@v4
        with:
          name: plugin-natives
          path: native

      - name: Inspect symbol versions
        run: |
          set -euo pipefail
          LIB=native/linux-x86_64/libfontsubsetting.so
          HIGHEST=$(strings "$LIB" | grep -oE 'GLIBC_[0-9.]+' | sort -V | tail -1)
          echo "Highest glibc symbol requirement: $HIGHEST"
          BASELINE="GLIBC_2.17"
          if [ "$(printf '%s\n%s\n' "$HIGHEST" "$BASELINE" | sort -V | tail -1)" != "$BASELINE" ]; then
            echo "::error::glibc baseline regression: $LIB requires $HIGHEST, expected ≤ $BASELINE"
            exit 1
          fi

      - name: Load on Debian 11 (glibc 2.31)
        run: |
          set -euo pipefail
          LIB=native/linux-x86_64/libfontsubsetting.so
          OUTPUT=$(docker run --rm -v "$PWD/$LIB:/lib.so:ro" debian:11 ldd /lib.so 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "not found"; then
            echo "::error::libfontsubsetting.so cannot resolve all symbols on Debian 11"
            exit 1
          fi

  # ==========================================================================
  # Test native libraries on all platforms
  # ==========================================================================
  test:
    name: Test (${{ matrix.platform }})
    needs: build-native
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            lib: libfontsubsetting.so
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            lib: libfontsubsetting.so
          - os: macos-latest
            platform: darwin-aarch64
            lib: libfontsubsetting.dylib
          - os: windows-latest
            platform: windows-x86_64
            lib: fontsubsetting.dll
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Download native libraries
        uses: actions/download-artifact@v4
        with:
          name: plugin-natives
          path: plugin/src/main/resources/native

      - name: Verify native library exists
        shell: bash
        run: |
          LIB_PATH="plugin/src/main/resources/native/${{ matrix.platform }}/${{ matrix.lib }}"
          if [ ! -f "$LIB_PATH" ]; then
            echo "::error::Native library not found at $LIB_PATH"
            find plugin/src/main/resources -type f || true
            exit 1
          fi
          echo "Found native library: $(ls -lh "$LIB_PATH")"

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        working-directory: plugin
        run: ../gradlew test --info

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        working-directory: plugin
        shell: cmd
        run: ..\gradlew.bat test --info

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.platform }}
          path: plugin/build/reports/tests/test/
          retention-days: 14

  # ==========================================================================
  # Build and publish the plugin
  # ==========================================================================
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    needs: [test, glibc-baseline]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION=${{ github.event.inputs.version }}
          else
            VERSION="dev-${GITHUB_SHA::8}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Download plugin native libraries
        uses: actions/download-artifact@v4
        with:
          name: plugin-natives
          path: plugin/src/main/resources/native

      - name: Verify native libraries
        run: |
          echo "Plugin native libraries for packaging:"
          find plugin/src/main/resources/native -type f \( -name "*.so" -o -name "*.dll" -o -name "*.dylib" \) \
            -exec ls -lh {} \;

      - name: Install CMake 3.31.6
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "cmake;3.31.6"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build plugin
        run: |
          cd plugin && ../gradlew build --build-cache --parallel --info

      - name: Verify native libraries in JAR
        run: |
          PLUGIN_JAR=$(find plugin/build/libs -name "plugin*.jar" -not -name "*-sources.jar" -not -name "*-javadoc.jar" | head -1)
          if [ -n "$PLUGIN_JAR" ]; then
            echo "Checking $PLUGIN_JAR:"
            jar tf "$PLUGIN_JAR" | grep -E "native/.*\.(so|dll|dylib)" || {
              echo "ERROR: No native libraries found in JAR!"
              jar tf "$PLUGIN_JAR"
              exit 1
            }
          else
            echo "ERROR: Plugin JAR not found!"
            find plugin/build/libs -name "*.jar"
            exit 1
          fi

      - name: Publish plugin to GitHub Packages
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd plugin && ../gradlew publishAllPublicationsToGitHubPackagesRepository \
            -Pversion=${{ steps.version.outputs.version }} \
            -PgithubPackagesUrl=https://maven.pkg.github.com/${{ github.repository }} \
            -PgithubPackagesUsername=${{ github.actor }} \
            -PgithubPackagesPassword=${{ secrets.GITHUB_TOKEN }} \
            --build-cache --parallel --info

      - name: Publish runtime to GitHub Packages
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew :runtime:publishMavenPublicationToGitHubPackagesRepository \
            -Pversion=${{ steps.version.outputs.version }} \
            -PgithubPackagesUrl=https://maven.pkg.github.com/${{ github.repository }} \
            -PgithubPackagesUsername=${{ github.actor }} \
            -PgithubPackagesPassword=${{ secrets.GITHUB_TOKEN }} \
            --build-cache --info

      - name: Publish to Gradle Plugin Portal
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
        run: |
          cd plugin && ../gradlew publishPlugins \
            -Pversion=${{ steps.version.outputs.version }} \
            -Pgradle.publish.key=${{ secrets.GRADLE_PUBLISH_KEY }} \
            -Pgradle.publish.secret=${{ secrets.GRADLE_PUBLISH_SECRET }} \
            --no-daemon --stacktrace

      - name: Publish plugin to Maven Central
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          cd plugin && ../gradlew publishAndReleaseToMavenCentral \
            -Pversion=${{ steps.version.outputs.version }} \
            --no-daemon --stacktrace

      - name: Publish runtime to Maven Central
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew :runtime:publishAndReleaseToMavenCentral \
            -Pversion=${{ steps.version.outputs.version }} \
            --no-daemon --stacktrace

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: plugin/build/libs/*.jar
          body: |
            ## Font Subsetting Plugin ${{ github.ref_name }}

            ### Installation
            ```kotlin
            plugins {
                id("com.davidmedenjak.fontsubsetting") version "${{ steps.version.outputs.version }}"
            }
            ```

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            plugin/build/libs/*.jar
            plugin/build/reports/
          retention-days: 7
