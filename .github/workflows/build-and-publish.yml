name: Build and Publish

on:
  push:
    branches: [ main, develop, 'dev/**' ]
    tags:
      - 'v*'
    paths:
      - 'plugin/**'
      - '.github/workflows/build-and-publish.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'plugin/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  DOCKER_BUILDKIT: 1

jobs:
  # ==========================================================================
  # Cross-compile native libraries for all platforms
  # ==========================================================================
  build-native:
    name: Build Native Libraries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: plugin
          file: plugin/Dockerfile.cross-compile
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          load: true
          tags: |
            fontsubsetting-cross-compiler:local
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/fontsubsetting-cross-compiler:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build all native libraries
        working-directory: plugin
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -v "$PWD/build:/workspace/build" \
            -w /workspace \
            fontsubsetting-cross-compiler:local \
            bash -c "
              mkdir -p /workspace/build/native-cross
              mkdir -p /workspace/src/main/resources/native
              chmod +x ./build-all-natives.sh
              ./build-all-natives.sh
            "

      - name: Upload native libraries
        uses: actions/upload-artifact@v4
        with:
          name: native-libraries
          path: |
            plugin/src/main/resources/native/linux-x86_64/libfontsubsetting.so
            plugin/src/main/resources/native/windows-x86_64/fontsubsetting.dll
            plugin/src/main/resources/native/darwin-x86_64/libfontsubsetting.dylib
            plugin/src/main/resources/native/darwin-aarch64/libfontsubsetting.dylib
          retention-days: 7

  # ==========================================================================
  # Test native libraries on all platforms
  # ==========================================================================
  test:
    name: Test (${{ matrix.platform }})
    needs: build-native
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            lib: libfontsubsetting.so
          - os: macos-latest
            platform: darwin-aarch64
            lib: libfontsubsetting.dylib
          - os: windows-latest
            platform: windows-x86_64
            lib: fontsubsetting.dll
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Download native libraries
        uses: actions/download-artifact@v4
        with:
          name: native-libraries
          path: plugin/src/main/resources/native

      - name: Verify native library exists
        shell: bash
        run: |
          LIB_PATH="plugin/src/main/resources/native/${{ matrix.platform }}/${{ matrix.lib }}"
          if [ ! -f "$LIB_PATH" ]; then
            echo "::error::Native library not found at $LIB_PATH"
            find plugin/src/main/resources -type f || true
            exit 1
          fi
          echo "Found native library: $(ls -lh "$LIB_PATH")"

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        working-directory: plugin
        run: ../gradlew test --info

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        working-directory: plugin
        shell: cmd
        run: ..\gradlew.bat test --info

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.platform }}
          path: plugin/build/reports/tests/test/
          retention-days: 14

  # ==========================================================================
  # Build and publish the plugin
  # ==========================================================================
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION=${{ github.event.inputs.version }}
          else
            VERSION="dev-${GITHUB_SHA::8}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Download native libraries
        uses: actions/download-artifact@v4
        with:
          name: native-libraries
          path: plugin/src/main/resources/native

      - name: Verify native libraries
        run: |
          echo "Native libraries for packaging:"
          find plugin/src/main/resources/native -type f \( -name "*.so" -o -name "*.dll" -o -name "*.dylib" \) \
            -exec ls -lh {} \;

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build plugin
        run: |
          cd plugin && ../gradlew build --build-cache --parallel --info

      - name: Verify native libraries in JAR
        run: |
          PLUGIN_JAR=$(find plugin/build/libs -name "plugin*.jar" -not -name "*-sources.jar" -not -name "*-javadoc.jar" | head -1)
          if [ -n "$PLUGIN_JAR" ]; then
            echo "Checking $PLUGIN_JAR:"
            jar tf "$PLUGIN_JAR" | grep -E "native/.*\.(so|dll|dylib)" || {
              echo "ERROR: No native libraries found in JAR!"
              jar tf "$PLUGIN_JAR"
              exit 1
            }
          else
            echo "ERROR: Plugin JAR not found!"
            find plugin/build/libs -name "*.jar"
            exit 1
          fi

      - name: Publish to GitHub Packages
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd plugin && ../gradlew publishAllPublicationsToGitHubPackagesRepository \
            -Pversion=${{ steps.version.outputs.version }} \
            -PgithubPackagesUrl=https://maven.pkg.github.com/${{ github.repository }} \
            -PgithubPackagesUsername=${{ github.actor }} \
            -PgithubPackagesPassword=${{ secrets.GITHUB_TOKEN }} \
            --build-cache --parallel --info

      - name: Publish to Gradle Plugin Portal
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
        run: |
          cd plugin && ../gradlew publishPlugins \
            -Pversion=${{ steps.version.outputs.version }} \
            -Pgradle.publish.key=${{ secrets.GRADLE_PUBLISH_KEY }} \
            -Pgradle.publish.secret=${{ secrets.GRADLE_PUBLISH_SECRET }} \
            --no-daemon --stacktrace

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: plugin/build/libs/*.jar
          body: |
            ## Font Subsetting Plugin ${{ github.ref_name }}

            ### Installation
            ```kotlin
            plugins {
                id("com.davidmedenjak.fontsubsetting") version "${{ steps.version.outputs.version }}"
            }
            ```

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            plugin/build/libs/*.jar
            plugin/build/reports/
          retention-days: 7
